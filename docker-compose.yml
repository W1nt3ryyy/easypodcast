services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_OUTER_PORT}:${DATABASE_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - prod
      - dev

  django-web:
    build: ./django-web/
    container_name: django-docker
    volumes:
      - ./django-web:/app
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 90"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_ENGINE: ${DATABASE_ENGINE}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: db
      DATABASE_PORT: ${DATABASE_PORT}
    env_file:
      - .env
    profiles:
      - prod

  frontend:
    build: ./frontend/
    container_name: react-frontend
    expose:
      - "80"
    depends_on:
      - django-web
    restart: always
    profiles:
      - prod

  caddy:
    image: caddy:2-alpine
    container_name: easypodcasts-caddy
    restart: always
    env_file:
      - .env
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - django-web
    profiles:
      - prod

  django-dev:
    build: ./django-web/
    container_name: django-dev
    volumes:
      - ./django-web:/app
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "True"
      DJANGO_LOGLEVEL: debug
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,*
      DATABASE_ENGINE: ${DATABASE_ENGINE}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: db
      DATABASE_PORT: ${DATABASE_PORT}
    env_file:
      - .env
    profiles:
      - dev

  frontend-dev:
    image: node:20
    container_name: react-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_PROXY_TARGET: http://django-dev:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - django-dev
    profiles:
      - dev

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
